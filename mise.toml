[tools]
node = "24"
pnpm = "11.5.0"

[settings]
lockfile = true

[tasks.install]
description = "依存関係をインストールする"
run = "pnpm install"

[tasks.dev]
description = "開発サーバーを起動する"
run = '''
set -eu

# API 側は Astro に URL を渡す必要があるため、先に空き port を決める。
API_PORT="$(node -e "require('node:net').createServer().listen(0, '127.0.0.1', function () { console.log(this.address().port); this.close(); })")"
API_BASE_URL="http://127.0.0.1:${API_PORT}"

# Wrangler の inspector port も 0 にして、複数 worktree 起動時の衝突を避ける。
echo "API ${API_BASE_URL}"
(cd apps/api && pnpm exec wrangler dev --port "${API_PORT}" --inspector-port 0) &
API_PID="$!"

# Astro 終了時や Ctrl-C 時に、background 起動した API も停止する。
trap 'kill "${API_PID}" 2>/dev/null || true' EXIT INT TERM

# Astro には公開環境変数として API URL を渡す。
echo "Web PUBLIC_API_BASE_URL=${API_BASE_URL}"
(cd apps/web && PUBLIC_API_BASE_URL="${API_BASE_URL}" pnpm exec astro dev --host 127.0.0.1)
'''

[tasks.lint]
description = "静的解析を実行する"
run = "pnpm exec biome check ."

[tasks.format]
description = "フォーマットを適用する"
run = "pnpm exec biome check --write ."

[tasks.test]
description = "テストを実行する"
run = "pnpm -r --if-present test"

[tasks."test:all"]
description = "すべてのテストを実行する"
depends = ["test"]

[tasks.security]
description = "本番依存関係の脆弱性監査を実行する"
run = "pnpm audit --prod"

[tasks."security:all"]
description = "開発依存関係を含む脆弱性監査を実行する"
run = "pnpm audit"

[tasks."deps:outdated"]
description = "依存関係の更新候補を確認する"
run = "pnpm outdated"

[tasks.check]
description = "日常的な軽量検証を実行する"
depends = ["lint", "test"]

[tasks.build]
description = "ビルドを実行する"
run = "pnpm -r --if-present build"

[tasks.verify]
description = "PR 前の総合検証を実行する"
depends = ["check", "security:all", "test:all", "build"]

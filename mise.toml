[tools]
node = "24"
pnpm = "11.5.0"

[settings]
lockfile = true

[tasks.install]
description = "依存関係をインストールする"
run = "pnpm install"

[tasks.dev]
description = "開発サーバーを起動する"
# FE / BE の起動順、空き port 探索、API readiness 待ちは script 側で扱う。
run = "sh scripts/start_dev_servers_with_available_ports.sh"

[tasks.lint]
description = "静的解析を実行する"
run = "pnpm exec biome check ."

[tasks.format]
description = "フォーマットを適用する"
run = "pnpm exec biome check --write ."

[tasks.test]
description = "テストを実行する"
run = "pnpm -r --if-present test"

[tasks."test:all"]
description = "すべてのテストを実行する"
depends = ["test"]

[tasks.security]
description = "本番依存関係の脆弱性監査を実行する"
run = "pnpm audit --prod"

[tasks."security:all"]
description = "開発依存関係を含む脆弱性監査を実行する"
run = "pnpm audit"

[tasks."deps:outdated"]
description = "依存関係の更新候補を確認する"
run = "pnpm outdated"

[tasks.check]
description = "日常的な軽量検証を実行する"
depends = ["lint", "test"]

[tasks.build]
description = "ビルドを実行する"
run = "pnpm -r --if-present build"

[tasks.verify]
description = "PR 前の総合検証を実行する"
depends = ["check", "security:all", "test:all", "build"]
